    <div>
          <div class="flex items-center justify-between mb-2">
            <label class="block text-sm font-medium text-gray-700">Options</label>
            <select
              (change)="onOptionSelect($event)"
              class="text-sm border border-gray-300 rounded-lg px-3 py-1.5"
            >
              <option value="">+ Add Option</option>
              @for (opt of availableOptions(); track opt.id) {
                <option [value]="opt.id">{{ opt.name }}</option>
              }
            </select>
          </div>
          @for (opt of options.controls; track $index; let oi = $index) {
            <div [formGroupName]="oi" class="p-4 border border-gray-200 rounded-lg bg-gray-50 mb-3">
              <div class="flex items-start gap-3">
                <div class="flex-1 space-y-3">
                   <div class="space-y-3">
                     <div>
                       <input
                         type="text"
                         formControlName="name"
                         class="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm bg-gray-100"
                         readonly
                       />
                     </div>
                     <!-- Option Values -->
                     <div>
                       <div class="flex items-center justify-between mb-1">
                         <span class="text-xs font-medium text-gray-500">Values</span>
                         <div class="flex gap-2 mb-1">
                           <input #valueInput type="text" class="flex-1 px-3 py-1.5 rounded-lg border border-gray-300 text-sm"
                             placeholder="Enter value" (keydown.enter)="addOptionValueFromInput(oi, valueInput.value); valueInput.value = ''" />
                           <button type="button" (click)="addOptionValueFromInput(oi, valueInput.value); valueInput.value = ''"
                             class="px-3 py-1.5 text-sm text-indigo-600 hover:text-indigo-800 font-medium">
                             + Add
                           </button>
                         </div>
                       </div>
                       @for (val of getOptionValuesForm(oi).controls; track $index; let vi = $index) {
                         <div [formGroupName]="vi" class="flex gap-2 mb-1">
                           <input
                             type="text"
                             formControlName="name"
                             class="flex-1 px-3 py-1.5 rounded-lg border border-gray-300 text-sm"
                           />
                           <button
                             type="button"
                             (click)="removeOptionValue(oi, vi)"
                             class="px-2 text-red-500 hover:bg-red-50 rounded text-sm"
                           >
                             Remove
                           </button>
                         </div>
                       }
                     </div>
                   </div>
                </div>
                <button
                  type="button"
                  (click)="removeOption(oi)"
                  class="p-1.5 text-red-500 hover:bg-red-50 rounded-lg transition-colors"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M6 18L18 6M6 6l12 12"
                    />
                  </svg>
                </button>
              </div>
            </div>
          }
        </div>
