<header
  class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 sticky top-0 z-30"
>
  <div class="flex items-center gap-4">
    <nav class="flex items-center text-sm text-gray-500">
      <span class="text-gray-400">Home</span>
      <svg class="w-4 h-4 mx-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
      </svg>
      <span class="text-gray-700 font-medium">{{ pageTitle }}</span>
    </nav>
  </div>

  <div class="flex items-center gap-4">
    <div class="relative">
      <input
        type="text"
        placeholder="Search..."
        class="w-64 pl-10 pr-4 py-2 rounded-lg border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
        (input)="onSearch($event)"
      />
      <svg
        class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
        />
      </svg>
    </div>

    <button class="relative p-2 rounded-lg hover:bg-gray-100 text-gray-500">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
        />
      </svg>
      <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
    </button>

    @if (isLogged()) {
        <div class="flex items-center gap-3 pl-4 border-l border-gray-200">
          <a routerLink="/profile" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
          <div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center overflow-hidden">
            @if (currentUser()?.imageUrl) {
              <img [src]="currentUser()?.imageUrl" alt="Avatar" class="w-full h-full object-cover">
            } @else {
              <span class="text-sm font-medium text-indigo-700">
                {{ currentUser()?.firstName?.charAt(0) }}{{ currentUser()?.lastName?.charAt(0) }}
              </span>
            }
          </div>
            <div class="hidden sm:block text-left">
              <p class="text-sm font-medium text-gray-700">{{ currentUser()?.firstName }} {{ currentUser()?.lastName }}</p>
              <p class="text-xs text-gray-400">{{ currentUser()?.email }}</p>
            </div>
          </a>
          <button
            (click)="logout()"
            class="ml-2 px-3 py-1 text-xs font-medium text-red-600 hover:bg-red-50 rounded-md transition-colors border border-red-200 hover:border-red-300"
          >
            Logout
          </button>
        </div>
    } @else {
        <button routerLink="/login" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 transition-colors">
          Login
        </button>
    }
  </div>
</header>
