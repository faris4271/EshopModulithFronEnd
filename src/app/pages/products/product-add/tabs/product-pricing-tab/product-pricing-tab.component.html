<div [formGroup]="formService.getSubGroup('pricing')" class="space-y-5">
  <h2 class="text-lg font-semibold text-gray-900 mb-2">Pricing</h2>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Price ($) <span class="text-red-500">*</span></label>
    <input
      type="number"
      formControlName="price"
      min="0"
      step="0.01"
      class="w-full px-4 py-2.5 rounded-lg border text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
      [class.border-red-400]="formService.isFieldInvalid('pricing', 'price')"
      placeholder="0.00"
    />
    @if (formService.isFieldInvalid('pricing', 'price')) {
      <p class="mt-1 text-xs text-red-500">{{ formService.getErrorMessage('pricing', 'price') }}</p>
    }
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Old Price ($)</label>
    <input
      type="number"
      formControlName="oldPrice"
      min="0"
      step="0.01"
      class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
      placeholder="0.00"
    />
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Special Price ($)</label>
    <input
      type="number"
      formControlName="specialPrice"
      min="0"
      step="0.01"
      class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
      placeholder="0.00"
    />
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Special Price Start</label>
    <input
      type="datetime-local"
      formControlName="specialPriceStart"
      class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
    />
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Special Price End</label>
    <input
      type="datetime-local"
      formControlName="specialPriceEnd"
      class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
    />
  </div>

  <div class="flex gap-6 pt-2">
    <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
      <input
        type="checkbox"
        formControlName="isCallForPricing"
        class="w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500"
      />
      Call for Pricing
    </label>
    <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
      <input
        type="checkbox"
        formControlName="isAllowToOrder"
        class="w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500"
      />
      Allow to Order
    </label>
  </div>
</div>
