<div [formGroup]="formService.getSubGroup('inventory')" class="space-y-5">
  <h2 class="text-lg font-semibold text-gray-900 mb-2">Inventory</h2>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">SKU</label>
    <input
      type="text"
      formControlName="sku"
      class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
      placeholder="e.g. SKU-12345"
    />
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">GTIN</label>
    <input
      type="text"
      formControlName="gtin"
      class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
      placeholder="Global Trade Item Number"
    />
  </div>

  <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
    <input
      type="checkbox"
      formControlName="stockTrackingIsEnabled"
      class="w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500"
    />
    Enable Stock Tracking
  </label>
</div>
