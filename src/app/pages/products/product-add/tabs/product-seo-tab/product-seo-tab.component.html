<div [formGroup]="formService.getSubGroup('seo')" class="space-y-5">
  <h2 class="text-lg font-semibold text-gray-900 mb-2">SEO / Meta Information</h2>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Meta Title</label>
    <input
      type="text"
      formControlName="metaTitle"
      class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
      placeholder="Meta title for SEO"
    />
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Meta Keywords</label>
    <input
      type="text"
      formControlName="metaKeywords"
      class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
      placeholder="keyword1, keyword2, keyword3"
    />
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Meta Description</label>
    <textarea
      formControlName="metaDescription"
      rows="3"
      class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none"
      placeholder="Meta description for search engines"
    ></textarea>
  </div>
</div>
