<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Create Brand</h1>
      <p class="text-sm text-gray-500 mt-1">Add a new product brand</p>
    </div>
    <button
      type="button"
      (click)="router.navigate(['/brands'])"
      class="inline-flex items-center gap-2 px-4 py-2.5 border border-gray-300 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-50 transition-colors"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10 19l-7-7m0 0l7-7m-7 7h18"
        />
      </svg>
      Back
    </button>
  </div>

  @if (errorMessage()) {
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
      {{ errorMessage() }}
    </div>
  }

  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
    class="bg-white rounded-xl border border-gray-200 p-6"
  >
    <div class="space-y-5">
      <h2 class="text-lg font-semibold text-gray-900 mb-2">Brand Information</h2>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Brand Name <span class="text-red-500">*</span>
        </label>
        <input
          type="text"
          formControlName="name"
          (blur)="generateSlug()"
          class="w-full px-4 py-2.5 rounded-lg border text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
          [class.border-red-400]="isFieldInvalid('name')"
          placeholder="Enter brand name"
        />
        @if (isFieldInvalid('name')) {
          <p class="mt-1 text-xs text-red-500">{{ getErrorMessage('name') }}</p>
        }
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Slug <span class="text-red-500">*</span>
        </label>
        <div class="flex gap-2">
          <input
            type="text"
            formControlName="slug"
            class="flex-1 px-4 py-2.5 rounded-lg border text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
            [class.border-red-400]="isFieldInvalid('slug')"
            placeholder="auto-generated-from-name"
          />
          <button
            type="button"
            (click)="generateSlug()"
            class="px-3 py-2.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors"
          >
            Generate
          </button>
        </div>
        @if (isFieldInvalid('slug')) {
          <p class="mt-1 text-xs text-red-500">{{ getErrorMessage('slug') }}</p>
        }
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
        <textarea
          formControlName="description"
          rows="4"
          class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none"
          placeholder="Brand description"
        ></textarea>
      </div>

      <div class="pt-2">
        <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
          <input
            type="checkbox"
            formControlName="isPublished"
            class="w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500"
          />
          Published
        </label>
      </div>
    </div>

    <div class="flex gap-3 mt-8 pt-6 border-t border-gray-200">
      <button
        type="submit"
        [disabled]="isSubmitting()"
        class="flex-1 px-6 py-2.5 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed"
      >
        @if (isSubmitting()) {
          Saving...
        } @else {
          Create Brand
        }
      </button>
      <button
        type="button"
        (click)="router.navigate(['/brands'])"
        class="px-6 py-2.5 border border-gray-300 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-50 transition-colors"
      >
        Cancel
      </button>
    </div>
  </form>
</div>
